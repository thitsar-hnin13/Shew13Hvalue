<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Fashion Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
background:linear-gradient(135deg,#0f0f15,#1c1c26);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;
}

/* MAIN CONTAINER */

.product-wrapper{

max-width:1200px;
width:100%;
display:flex;
gap:60px;
flex-wrap:wrap;

padding:40px;
border-radius:25px;

background:rgba(255,255,255,0.03);

backdrop-filter:blur(12px);

box-shadow:
0 15px 40px rgba(0,0,0,0.6),
0 0 60px rgba(255,255,255,0.05) inset;

}

/* PRODUCT IMAGE */

.image-section{
flex:1;
text-align:center;
}

.image-frame{

position:relative;
border-radius:20px;
padding:20px;

background:rgba(255,255,255,0.02);

box-shadow:
0 0 30px rgba(255,255,255,0.08),
inset 0 0 20px rgba(255,255,255,0.05);

}

/* LED GLOW */

.image-frame::before{

content:"";
position:absolute;
inset:-2px;

border-radius:22px;

background:linear-gradient(
45deg,
#00f5ff,
#9d4edd,
#ff4d6d,
#00f5ff
);

background-size:400%;
z-index:-1;

animation:glowMove 8s linear infinite;

filter:blur(20px);

}

@keyframes glowMove{

0%{background-position:0%}
100%{background-position:400%}

}

/* MAIN IMAGE */

#mainImage{

width:100%;
max-width:420px;
border-radius:16px;
transition:transform .5s ease;

}

#mainImage:hover{
transform:scale(1.08);
}

/* THUMBNAILS */

.thumbnail-row{

display:flex;
justify-content:center;
margin-top:20px;
gap:12px;

}

.thumbnail-row img{

width:65px;
height:65px;
border-radius:10px;
cursor:pointer;
opacity:.6;
transition:.3s;

}

.thumbnail-row img:hover{

opacity:1;
transform:scale(1.08);

}

/* DETAILS */

.product-details{

flex:1;
display:flex;
flex-direction:column;
gap:25px;

}

.brand{

letter-spacing:3px;
font-size:12px;
opacity:.7;

}

.title{

font-size:34px;
font-weight:500;

}

.price{

font-size:26px;
color:#e6e6e6;

}

/* COLOR SELECT */

.colors{

display:flex;
gap:12px;

}

.color-btn{

width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
border:2px solid transparent;
transition:.3s;

}

.color-btn:hover{

transform:scale(1.2);
box-shadow:0 0 10px rgba(255,255,255,0.7);

}

/* SIZE SELECT */

.sizes{

display:flex;
gap:12px;

}

.size{

padding:10px 18px;
border-radius:30px;

border:1px solid rgba(255,255,255,0.3);

cursor:pointer;

transition:.3s;

}

.size.active{

background:white;
color:black;
box-shadow:0 0 15px rgba(255,255,255,0.7);

}

/* BUTTONS */

.button-group{

display:flex;
gap:20px;
margin-top:10px;

}

.btn{

padding:15px 34px;
border-radius:50px;

border:none;

cursor:pointer;

font-size:15px;

transition:.35s;

}

.cart{

background:linear-gradient(45deg,#00f5ff,#9d4edd);
color:white;

}

.buy{

background:white;
color:black;

}

.btn:hover{

transform:translateY(-3px);

box-shadow:0 10px 25px rgba(0,0,0,0.5);

}

/* RESPONSIVE */

@media(max-width:900px){

.product-wrapper{

flex-direction:column;
text-align:center;

}

.product-details{

align-items:center;

}

}

</style>
</head>

<body>

<div class="product-wrapper">

<!-- IMAGE SECTION -->

<div class="image-section">

<div class="image-frame">

<img id="mainImage"
src="img/g1.jpg">

</div>

<div class="thumbnail-row">

<img src="img/1.jpg" onclick="changeImage(this)">
<img src="img/2.jpg" onclick="changeImage(this)">
<img src="img/r1.jpg" onclick="changeImage(this)">

</div>

</div>

<!-- DETAILS -->

<div class="product-details">

<div class="brand">Shew13H value</div>

<div class="title">Silk Evening Dress</div>

<div class="price">$129</div>

<p>
A refined luxury evening dress designed for elegance,
movement, and timeless fashion.
</p>

<!-- COLORS -->

<div>

<h4>Color</h4>

<div class="colors">

<div class="color-btn"
style="background:#1f0901"
onclick="setColor('pink')"></div>

<div class="color-btn"
style="background:#000"
onclick="setColor('black')"></div>

<div class="color-btn"
style="background:#ff0000"
onclick="setColor('gold')"></div>

</div>

</div>

<!-- SIZES -->

<div>

<h4>Size</h4>

<div class="sizes">

<div class="size">S</div>
<div class="size">M</div>
<div class="size">L</div>
<div class="size">XL</div>

</div>

</div>

<!-- BUTTONS -->

<div class="button-group">

<button class="btn cart">
Add to Cart
</button>

<button class="btn buy">
Buy Now
</button>

</div>

</div>

</div>

<script>

/* THUMBNAIL SWITCH */

function changeImage(element){

document.getElementById("mainImage").src = element.src

}

/* COLOR SWITCH */

function setColor(color){

const img = document.getElementById("mainImage")

if(color==="pink")
img.src="img/1.jpg"

if(color==="black")
img.src="img/2.jpg"

if(color==="gold")
img.src="img/r1.jpg"

}

/* SIZE SELECTION */

const sizes = document.querySelectorAll(".size")

sizes.forEach(size=>{

size.addEventListener("click",()=>{

sizes.forEach(s=>s.classList.remove("active"))

size.classList.add("active")

})

})

</script>

</body>
</html>
